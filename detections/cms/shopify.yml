name: Shopify
category: E-commerce
website: https://shopify.com
checks:
  headers:
    x-shopify-stage:
    powered-by:
      pattern: 'Shopify'

  meta:
    shopify-checkout-api-token:
    shopify-digital-wallet:

  cookies:
    _shopify_s:
    _shopify_y:
    _shopify_essential_:
    _shopify_marketing:
    _shopify_analytics:

  js:
    - expression: "typeof ShopifyAnalytics !== 'undefined'"
    - expression: "typeof Shopify !== 'undefined' && typeof Shopify.shop !== 'undefined'"
    - expression: "typeof ShopifyBuy !== 'undefined'"
