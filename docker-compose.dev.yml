x-chrome: &chrome
  image: chromedp/headless-shell
  command:
    - --ignore-certificate-errors
    - --remote-allow-origins=*
    - --disable-dev-shm-usage
    - --disable-gpu
  restart: always
  logging:
    driver: "none"
  shm_size: '512m'
  deploy:
    resources:
      limits:
        memory: 2G
  healthcheck:
    test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9222' 2>/dev/null"]
    interval: 5s
    timeout: 3s
    retries: 5
    start_period: 10s

services:
  chrome-1:
    <<: *chrome
  chrome-2:
    <<: *chrome
  chrome-3:
    <<: *chrome

  core:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      chrome-1:
        condition: service_healthy
      chrome-2:
        condition: service_healthy
      chrome-3:
        condition: service_healthy
    volumes:
      - ./detections:/app/detections:ro
      - ./config.yml:/app/config.yml:ro
    environment:
      - FINGERPRINTER_LOG_LEVEL=debug
