services:
  chrome:
    image: chromedp/headless-shell
    command:
      - --ignore-certificate-errors
      - --remote-allow-origins=*
      - --disable-dev-shm-usage
      - --disable-gpu
    restart: always
    shm_size: '512m'
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9222' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  core:
    image: ghcr.io/joshuamart/fingerprinter:latest
    ports:
      - "3001:3001"
    depends_on:
      chrome:
        condition: service_healthy
    volumes:
      - ./detections:/app/detections:ro
      - ./config.yml:/app/config.yml:ro
